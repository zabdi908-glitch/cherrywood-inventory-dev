services:
  - type: web
    name: cherrywood-auto-parts
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: cherrywood123
      - key: FLASK_DEBUG
        value: False
      - key: RENDER
        value: true
      - key: PYTHON_VERSION
        value: 3.11.0
