<!DOCTYPE html>
<html>
<head>
    <title>Edit Vehicle - Cherrywood Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8">
    <div class="max-w-2xl mx-auto bg-slate-800 p-6 rounded-lg shadow-xl">
        <h2 class="text-2xl font-bold text-orange-500 mb-6">Edit Vehicle: {{ vehicle.title }}</h2>
        <form method="POST" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="text" name="title" value="{{ vehicle.title }}" class="w-full p-2 bg-slate-900 border border-slate-700 rounded" required>
            <input type="text" name="make" value="{{ vehicle.make }}" class="w-full p-2 bg-slate-900 border border-slate-700 rounded" required>
            <input type="text" name="model" value="{{ vehicle.model }}" class="w-full p-2 bg-slate-900 border border-slate-700 rounded" required>
            <input type="text" name="year" value="{{ vehicle.year }}" class="w-full p-2 bg-slate-900 border border-slate-700 rounded" required>
            <input type="text" name="reg" value="{{ vehicle.reg }}" class="w-full p-2 bg-slate-900 border border-slate-700 rounded" required>
            <input type="text" name="engine" value="{{ vehicle.engine }}" class="w-full p-2 bg-slate-900 border border-slate-700 rounded" required>
            <input type="text" name="fuel" value="{{ vehicle.fuel }}" class="w-full p-2 bg-slate-900 border border-slate-700 rounded" required>
            <input type="text" name="transmission" value="{{ vehicle.transmission }}" class="w-full p-2 bg-slate-900 border border-slate-700 rounded" required>
            <input type="text" name="mileage" value="{{ vehicle.mileage }}" class="w-full p-2 bg-slate-900 border border-slate-700 rounded" required>
            <select name="status" class="w-full p-2 bg-slate-900 border border-slate-700 rounded">
                <option value="Breaking" {% if vehicle.status == 'Breaking' %}selected{% endif %}>Breaking</option>
                <option value="In Stock" {% if vehicle.status == 'In Stock' %}selected{% endif %}>In Stock</option>
                <option value="Sold" {% if vehicle.status == 'Sold' %}selected{% endif %}>Sold</option>
            </select>
            <input type="text" name="image_url" value="{{ vehicle.image_url }}" class="w-full p-2 bg-slate-900 border border-slate-700 rounded">
            <textarea name="parts_available" class="w-full p-2 bg-slate-900 border border-slate-700 rounded">{{ vehicle.parts_available }}</textarea>
            <textarea name="description" class="w-full p-2 bg-slate-900 border border-slate-700 rounded">{{ vehicle.description }}</textarea>
            <button type="submit" class="w-full bg-green-600 p-3 rounded font-bold hover:bg-green-700">Save Changes</button>
            <a href="/" class="block text-center text-slate-400 mt-4">Cancel</a>
        </form>
    </div>
</body>
</html>
